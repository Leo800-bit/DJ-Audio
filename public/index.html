<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0a">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icon-192.png">
<title>NearEar · 深夜电台</title>
<style>
/* ── Reset & Variables ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --safeBottom:0px;
  --accent:#ff6b6b;--accentGlow:rgba(255,107,107,0.25);
  --surface:#111;--surfaceAlt:#0d0d0d;
  --text:#eee;--text2:#999;--text3:#555;
  --border:#1e1e1e;--borderFocus:#333;
  --bubUser:rgba(255,107,107,0.12);--bubUserText:#ffcccc;
  --bubDJ:#1a1a1a;--bubDJText:#ddd;
  --playerBg:#0a0a0a;
}
:root.light{
  --accent:#e55050;--accentGlow:rgba(229,80,80,0.15);
  --surface:#fff;--surfaceAlt:#fafafa;
  --text:#1a1a1a;--text2:#777;--text3:#bbb;
  --border:#e5e5e5;--borderFocus:#ccc;
  --bubUser:rgba(229,80,80,0.08);--bubUserText:#8b1a1a;
  --bubDJ:#f5f5f5;--bubDJText:#333;
  --playerBg:#f0f0f0;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--surface);color:var(--text);
  padding-top:env(safe-area-inset-top);
  transition:background 0.6s ease,color 0.6s ease;
}

/* ── NowPlaying mini bar ── */
.now-playing{
  position:fixed;top:env(safe-area-inset-top);left:0;right:0;z-index:60;
  height:52px;padding:6px 12px;
  background:var(--surfaceAlt);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:10px;
  transition:background 0.6s ease;
}
.np-cover{width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--border)}
.np-info{flex:1;min-width:0;overflow:hidden}
.np-title{font-size:0.78rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-artist{font-size:0.65rem;color:var(--text2);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.np-status{font-size:0.6rem;color:var(--accent);margin-top:1px}
.np-wave{display:flex;align-items:flex-end;gap:1.5px;height:20px;opacity:0.2;flex-shrink:0}
.np-wave .w{width:2px;border-radius:1px;background:var(--accent);transition:height 0.12s}
.np-play{background:none;border:none;color:var(--text);cursor:pointer;padding:4px;flex-shrink:0;display:flex;align-items:center}
.np-play svg{width:20px;height:20px}
.np-speaker{background:none;border:none;color:var(--accent);cursor:pointer;padding:4px;flex-shrink:0;display:flex;align-items:center;font-size:0.7rem;gap:2px;opacity:0}

/* ── Main scroll area ── */
.main-scroll{
  position:fixed;top:calc(env(safe-area-inset-top) + 52px);bottom:56px;left:0;right:0;
  overflow-y:auto;overflow-x:hidden;
  padding:12px 10px 20px;
  scroll-behavior:smooth;
  -webkit-overflow-scrolling:touch;
}
.main-scroll::-webkit-scrollbar{width:0}

/* ── Player Card ── */
.player-card{
  background:var(--playerBg);border-radius:20px;padding:20px 16px 16px;
  margin-bottom:16px;border:1px solid var(--border);
  transition:background 0.6s ease, border-color 0.6s;
}
#cover-hero-wrapper{position:relative;width:140px;height:140px;margin:0 auto 14px;border-radius:14px;overflow:hidden;background:var(--border)}
.cover-hero{width:100%;height:100%;object-fit:cover;display:block}
.cover-hero-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:var(--text3)}
.progress-wrap{height:3px;background:var(--border);border-radius:2px;margin:10px 0;overflow:hidden}
.progress-fill{height:100%;background:var(--accent);border-radius:2px;width:0%;transition:width 0.1s linear}
.time-row{display:flex;justify-content:space-between;font-size:0.6rem;color:var(--text3);margin-bottom:10px}
.controls-row{display:flex;justify-content:center;align-items:center;gap:20px}
.ctrl{background:none;border:none;color:var(--text);cursor:pointer;padding:6px;display:flex;align-items:center}
.ctrl svg{width:22px;height:22px}
.ctrl.play{background:var(--accent);border-radius:50%;padding:10px;color:#fff}
.ctrl.play svg{width:20px;height:20px}
.source-badge{font-size:0.55rem;color:var(--text3);text-align:center;margin-top:6px}

/* ── Chat bubbles ── */
.chat-section{display:flex;flex-direction:column;gap:8px}
.bubble{
  max-width:85%;padding:10px 14px;border-radius:16px;
  font-size:0.82rem;font-weight:350;line-height:1.6;letter-spacing:0.005em;
  word-break:break-word;animation:bub 0.4s cubic-bezier(0.16,1,0.3,1) both;
  transition:transform 0.22s cubic-bezier(0.16,1,0.3,1), box-shadow 0.22s ease;
}
@keyframes bub{ from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
.bubble:hover{ transform:translateY(-1.5px) scale(1.01); }
.bub-user{
  align-self:flex-end; background:var(--bubUser); color:var(--bubUserText);
  border-bottom-right-radius:6px;
}
.bub-dj{
  align-self:flex-start; background:var(--bubDJ); color:var(--bubDJText);
  border:1px solid var(--border); border-bottom-left-radius:6px;
}
.bub-dj.speaking{ border-color:var(--accent); box-shadow:0 0 12px var(--accentGlow) }
.typing{ align-self:flex-start; display:flex; gap:3px; padding:10px 14px; }
.typing span{ width:5px;height:5px;border-radius:50%;background:var(--text3);animation:tb 0.7s ease-in-out infinite; }
.typing span:nth-child(2){animation-delay:0.1s} .typing span:nth-child(3){animation-delay:0.2s}
@keyframes tb{ 0%,60%,100%{transform:translateY(0);opacity:0.3} 30%{transform:translateY(-5px);opacity:1} }

/* ── Bottom input bar ── */
.input-bar{
  position:fixed; bottom:0; left:0; right:0; z-index:50;
  background:var(--surfaceAlt); backdrop-filter:blur(30px); -webkit-backdrop-filter:blur(30px);
  border-top:1px solid var(--border);
  padding:8px 10px; padding-bottom:max(8px, var(--safeBottom));
  display:flex; gap:8px; align-items:center;
  transition:background 0.6s ease;
}
.input-wrap{
  flex:1; display:flex; align-items:center; gap:6px;
  background:var(--surface); border:1px solid var(--border); border-radius:20px;
  padding:4px 6px 4px 14px;
  transition:border-color 0.25s, box-shadow 0.25s;
}
.input-wrap:focus-within{ border-color:var(--borderFocus); box-shadow:0 0 0 3px rgba(128,128,128,0.04); }
#user-input{
  flex:1; background:none; border:none; outline:none; padding:7px 0;
  color:var(--text); font-size:0.84rem; font-family:inherit; letter-spacing:0.005em;
}
#user-input::placeholder{ color:var(--text3) }
#user-input:disabled{ opacity:0.35 }
.send-btn{ background:none; border:none; color:var(--text3); cursor:pointer; padding:5px 7px; border-radius:50%; display:flex; align-items:center; justify-content:center; transition:color 0.2s; flex-shrink:0; }
.send-btn:active{ color:var(--accent) }
.send-btn:disabled{ opacity:0.25 }
.theme-btn{
  background:none; border:1px solid var(--border); border-radius:999px;
  padding:4px 6px; color:var(--text3); cursor:pointer; font-size:0.65rem;
  display:flex; align-items:center; gap:3px; transition:all 0.25s; flex-shrink:0;
}
.theme-btn:active{ color:var(--text); border-color:var(--borderFocus) }

/* Landscape tweak */
@media (min-width: 600px){
  .main-scroll{ max-width:420px; left:50%; transform:translateX(-50%) }
  .input-bar{ padding-left:calc((100vw - 400px)/2); padding-right:calc((100vw - 400px)/2) }
  .now-playing{ padding-left:calc((100vw - 400px)/2); padding-right:calc((100vw - 400px)/2) }
}
</style>
</head>
<body>

<!-- ── NowPlaying mini bar ── -->
<div class="now-playing" id="now-playing">
  <img class="np-cover" id="np-cover" src="" alt="" style="display:none">
  <div class="np-cover" id="np-placeholder" style="display:flex;align-items:center;justify-content:center;color:var(--text3)">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
  </div>
  <div class="np-info">
    <div class="np-title" id="np-title">NearEar</div>
    <div class="np-artist" id="np-artist">等待点播</div>
    <div class="np-status" id="np-status" style="display:none"></div>
  </div>
  <div class="np-wave" id="np-wave">
    <div class="w" style="height:6px"></div><div class="w" style="height:12px"></div><div class="w" style="height:8px"></div><div class="w" style="height:16px"></div><div class="w" style="height:4px"></div>
  </div>
  <button class="np-speaker" id="btn-speaker" title="DJ 语音开关" style="opacity:0">🔇</button>
  <button class="np-play" id="btn-play-mini" title="播放/暂停">
    <svg id="ico-play-m" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>
    <svg id="ico-pause-m" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
  </button>
</div>

<!-- ── Scrollable main ── -->
<div class="main-scroll" id="main-scroll">
  <!-- Player Card -->
  <div class="player-card">
    <div id="cover-hero-wrapper">
      <img id="cover-hero" class="cover-hero" src="" alt="" style="display:none">
      <div class="cover-hero-placeholder" id="cover-hero-placeholder">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="0.8"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
      </div>
    </div>
    <div style="text-align:center">
      <div style="font-size:0.95rem;font-weight:500;color:var(--text)" id="hero-title">等待你的点播</div>
      <div style="font-size:0.72rem;color:var(--text2);margin-top:2px" id="hero-artist">告诉 Near 你想听什么</div>
    </div>
    <div class="source-badge" id="source-badge"></div>
    <div class="progress-wrap"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="time-row"><span id="time-now">0:00</span><span id="time-end">0:00</span></div>
    <div class="controls-row">
      <button class="ctrl" id="btn-prev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="19 20 9 12 19 4 19 20"/><line x1="5" y1="19" x2="5" y2="5"/></svg></button>
      <button class="ctrl play" id="btn-play"><svg id="ico-play" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg><svg id="ico-pause" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg></button>
      <button class="ctrl" id="btn-next"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 4 15 12 5 20 5 4"/><line x1="19" y1="5" x2="19" y2="19"/></svg></button>
    </div>
  </div>

  <!-- Chat bubbles -->
  <div class="chat-section" id="chat-section"></div>
</div>

<!-- ── Input bar (bottom) ── -->
<div class="input-bar">
  <button class="theme-btn" id="theme-btn"><span id="theme-ico">🌙</span></button>
  <div class="input-wrap">
    <input type="text" id="user-input" placeholder="说心情，或点歌…" maxlength="300" autocomplete="off" enterkeyhint="send">
    <button class="send-btn" id="send-btn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<audio id="audio-player" preload="auto"></audio>
<audio id="audio-next" preload="auto"></audio>

<script>
(function(){
const $=id=>document.getElementById(id);
const audio=$('audio-player'), audioNext=$('audio-next');
const chatSection=$('chat-section'), userInput=$('user-input'), sendBtn=$('send-btn');
const iPlay=$('ico-play'),iPause=$('ico-pause'),iPlayM=$('ico-play-m'),iPauseM=$('ico-pause-m');
const coverHero=$('cover-hero'),coverPlace=$('cover-hero-placeholder');
const heroTitle=$('hero-title'),heroArtist=$('hero-artist'),sourceBadge=$('source-badge');
const timeNow=$('time-now'),timeEnd=$('time-end'),progressFill=$('progress-fill');
const npCover=$('np-cover'),npPlace=$('np-placeholder'),npTitle=$('np-title'),npArtist=$('np-artist'),npStatus=$('np-status');
const npWave=$('np-wave'),waveBars=npWave.querySelectorAll('.w');
const btnSpeaker=$('btn-speaker');

let chatHistory=[], isPlaying=false, waveInt=null, lastQuery=null, playedIds=[], curId=null, busy=false, dark=true;
let ttsEnabled=true, ttsSpeaking=false, pendingMusic=null;

// ── Server Configuration ──
let API_BASE_URL = localStorage.getItem('nearear_server_url') || '';
function getApiUrl(path) {
  return API_BASE_URL ? API_BASE_URL + path : path;
}

// ── Server Setup Modal (for APK/offline mode) ──
function checkServerSetup() {
  if (API_BASE_URL) return;
  // Determine if we're loaded from a file:// or local APK (not a live server)
  if (location.protocol === 'file:' || location.hostname === 'localhost' || location.hostname === '127.0.0.1' || location.hostname === '') {
    showServerSetupModal();
  }
}

function showServerSetupModal() {
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;';
  const card = document.createElement('div');
  card.style.cssText = 'background:var(--surface);color:var(--text);width:88%;max-width:380px;border-radius:20px;padding:28px 20px;border:1px solid var(--border);text-align:center;';
  card.innerHTML = `
    <div style="font-size:2rem;margin-bottom:8px;">📡</div>
    <div style="font-weight:600;font-size:1rem;margin-bottom:6px;">连接到服务器</div>
    <div style="font-size:0.72rem;color:var(--text2);margin-bottom:16px;line-height:1.5;">
      NearEar 需要连接到后端服务器才能工作。<br>
      请先在电脑上启动服务器，然后输入其地址。
    </div>
    <div style="background:var(--surfaceAlt);border-radius:12px;padding:12px;margin-bottom:16px;text-align:left;font-size:0.68rem;color:var(--text2);line-height:1.6;">
      <div style="font-weight:500;color:var(--text);margin-bottom:4px;">📋 如何获取地址：</div>
      1. 在电脑上运行 <code style="background:var(--border);padding:1px 6px;border-radius:4px;">node server.js</code>
      2. 记下终端显示的 IP（如 <code style="background:var(--border);padding:1px 6px;border-radius:4px;">http://192.168.x.x:3000</code>）
      3. 输入到下方，点击连接
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <input id="setup-url" type="url" placeholder="http://192.168.x.x:3000" value="" style="flex:1;padding:10px 12px;border-radius:12px;border:1px solid var(--borderFocus);background:var(--surface);color:var(--text);font-size:0.85rem;outline:none;">
      <button id="setup-connect" style="padding:10px 18px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-size:0.85rem;cursor:pointer;white-space:nowrap;">连接</button>
    </div>
    <div style="margin-top:12px;font-size:0.65rem;color:var(--text3);">
      提示：手机和电脑需要在<strong>同一个 WiFi</strong> 下
    </div>
  `;
  overlay.appendChild(card);
  document.body.appendChild(overlay);

  const input = card.querySelector('#setup-url');
  const btn = card.querySelector('#setup-connect');
  // Focus input
  setTimeout(() => input.focus(), 300);

  function doConnect() {
    let url = input.value.trim().replace(/\/+$/, '');
    if (!url) { input.style.borderColor = 'var(--accent)'; return; }
    if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'http://' + url;
    // Test connection
    btn.textContent = '检测中…';
    btn.disabled = true;
    fetch(url + '/api/ping', { method: 'GET', mode: 'cors' })
      .then(r => { if (!r.ok) throw new Error(); return r.text(); })
      .then(() => {
        API_BASE_URL = url;
        localStorage.setItem('nearear_server_url', url);
        overlay.remove();
        addBubble('dj', '📡 已连接到服务器！来聊点什么吧 🎙');
        userInput.focus();
      })
      .catch(() => {
        btn.textContent = '连接失败，重试';
        btn.disabled = false;
        input.style.borderColor = 'var(--accent)';
        input.placeholder = '无法连接，检查地址和网络';
      });
  }

  btn.addEventListener('click', doConnect);
  input.addEventListener('keydown', e => { if (e.key === 'Enter') doConnect(); });
}

// Check server setup after a short delay (after welcome bubble)
setTimeout(checkServerSetup, 600);

// ── Ping endpoint helper for server setup ──
// (server.js exposes GET /api/ping returning "pong")

// ── TTS Engine: Pure browser SpeechSynthesis (no native plugins, no server) ──
// Works on all Android WebViews via Google TTS engine
let ttsUtterance = null;
let ttsQueue = [];
let ttsPlaying = false;
let ttsVoice = null;

// Speaker toggle button
btnSpeaker.style.opacity = '1';
btnSpeaker.textContent = '🔊';
btnSpeaker.title = 'DJ 声音开关 (浏览器 TTS)';
btnSpeaker.addEventListener('click', () => {
  ttsEnabled = !ttsEnabled;
  if (!ttsEnabled) {
    stopTTS();
    btnSpeaker.textContent = '🔇';
  } else {
    btnSpeaker.textContent = '🔊';
  }
});

function stopTTS() {
  if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
  }
  ttsQueue = [];
  ttsPlaying = false;
  ttsSpeaking = false;
  npStatus.style.display = 'none';
  const bubs = chatSection.querySelectorAll('.bub-dj.speaking');
  bubs.forEach(b => b.classList.remove('speaking'));
  ttsUtterance = null;
}

function findChineseVoice() {
  if (!window.speechSynthesis) return null;
  const voices = window.speechSynthesis.getVoices();
  // Prefer zh-CN female (most common on Android), then zh, then any
  return voices.find(v => v.lang === 'zh-CN' && v.name.includes('Female'))
      || voices.find(v => v.lang === 'zh-CN')
      || voices.find(v => v.lang.startsWith('zh'))
      || voices.find(v => v.lang === 'en-US')
      || voices[0] || null;
}

function ttsPlayNext() {
  if (ttsQueue.length === 0) {
    ttsPlaying = false;
    ttsSpeaking = false;
    npStatus.style.display = 'none';
    const bubs = chatSection.querySelectorAll('.bub-dj.speaking');
    bubs.forEach(b => b.classList.remove('speaking'));
    const done = ttsQueue._onDone;
    ttsQueue._onDone = null;
    if (done) done();
    return;
  }
  ttsPlaying = true;
  npStatus.style.display = '';
  npStatus.textContent = 'DJ 正在说话… 🎙';

  const text = ttsQueue.shift();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = 'zh-CN';
  utterance.rate = 0.95;  // slightly slower — like a late-night DJ
  utterance.pitch = 1.05;
  utterance.volume = 1.0;

  // Re-find voice each time in case voices loaded asynchronously
  utterance.voice = findChineseVoice();
  // Save for potential cancel
  ttsUtterance = utterance;

  utterance.onend = () => {
    ttsUtterance = null;
    ttsPlayNext();
  };
  utterance.onerror = () => {
    ttsUtterance = null;
    ttsPlayNext();
  };

  window.speechSynthesis.speak(utterance);
}

async function speakDJText(text, onDone) {
  if (!ttsEnabled || !text) {
    if (onDone) onDone();
    return;
  }
  // Highlight last DJ bubble
  const bubs = chatSection.querySelectorAll('.bub-dj');
  if (bubs.length > 0) bubs[bubs.length - 1].classList.add('speaking');

  ttsSpeaking = true;
  ttsQueue._onDone = onDone;

  // Split long text into smaller chunks for better speech synthesis on mobile
  const chunks = splitForSpeech(text);
  for (const chunk of chunks) {
    ttsQueue.push(chunk);
  }
  if (!ttsPlaying) ttsPlayNext();
}

// Split long DJ monologue into sentence-sized chunks (better for mobile TTS)
function splitForSpeech(text) {
  // Split by sentence-ending punctuation, keep delimiter with each chunk
  const parts = text.split(/(?<=[。！？\n])/);
  const result = [];
  let buffer = '';
  for (const part of parts) {
    const trimmed = part.trim();
    if (!trimmed) continue;
    // If this part would exceed 80 chars, flush buffer first
    if (buffer.length + trimmed.length > 80) {
      if (buffer) result.push(buffer.trim());
      buffer = trimmed;
    } else {
      buffer += trimmed;
    }
  }
  if (buffer) result.push(buffer.trim());
  // If no punctuation was found, split by length
  if (result.length === 0 && text.trim()) {
    const t = text.trim();
    for (let i = 0; i < t.length; i += 60) {
      result.push(t.substring(i, i + 60));
    }
  }
  return result.length > 0 ? result : [text.trim()];
}

// ── Helpers ──
function fmt(s){ const m=Math.floor(s/60), sec=Math.floor(s%60); return `${m}:${String(sec).padStart(2,'0')}` }

function startWave(){ npWave.style.opacity='0.7'; if(waveInt)clearInterval(waveInt); waveInt=setInterval(()=>{ waveBars.forEach(w=>{ w.style.height=(2+Math.random()*14)+'px' }) },100) }
function stopWave(){ npWave.style.opacity='0.2'; if(waveInt){clearInterval(waveInt);waveInt=null}; waveBars.forEach(w=>{w.style.height='4px'}) }

function updateProgress(cur,dur){
  if(!dur||!isFinite(dur)||dur<=0){ progressFill.style.width='0%'; timeNow.textContent='0:00'; timeEnd.textContent='0:00'; return }
  const p=Math.min(cur/dur,1); progressFill.style.width=(p*100)+'%';
  timeNow.textContent=fmt(cur); timeEnd.textContent=fmt(dur);
}

function setPlayingUI(p){
  isPlaying=p;
  if(p){ iPlay.style.display='none';iPause.style.display='';iPlayM.style.display='none';iPauseM.style.display='';startWave() }
  else{ iPlay.style.display='';iPause.style.display='none';iPlayM.style.display='';iPauseM.style.display='none';stopWave() }
}

function updateArtwork(m){
  const a=m.artworkUrl||m.artworkUrl100||'';
  if(a){ coverHero.src=a;coverHero.style.display='';coverPlace.style.display='none'; npCover.src=a;npCover.style.display='';npPlace.style.display='none' }
  else{ coverHero.style.display='none';coverPlace.style.display=''; npCover.style.display='none';npPlace.style.display='' }
  heroTitle.textContent=m.trackName||'未知歌曲';
  heroArtist.textContent=m.artistName||'未知艺人';
  npTitle.textContent=m.trackName||'未知歌曲';
  npArtist.textContent=m.artistName||'未知艺人';
  // Source badge
  if(m.source==='archive') sourceBadge.textContent='🎵 全曲 · Internet Archive';
  else if(m.source==='itunes') sourceBadge.textContent='🎧 30s 试听 · iTunes';
  else sourceBadge.textContent='';
}

function playMusicDirect(m){
  if(!m||!m.previewUrl) return;
  if(m.trackId){ if(String(m.trackId)===String(curId)&&isPlaying)return; if(!playedIds.includes(String(m.trackId)))playedIds.push(String(m.trackId));curId=m.trackId }
  updateArtwork(m);
  audio.pause();audioNext.pause();audioNext.removeAttribute('src');
  audio.src=m.previewUrl; audio.load();
  audio.play().then(()=>setPlayingUI(true)).catch(()=>{});
}

// ── Core: DJ speaks, then music fades in (crossfade transition) ──
let crossfadeTimer = null;

function fadeInMusic(musicData, durationSec = 2.5) {
  if (!musicData || !musicData.previewUrl) return;
  updateArtwork(musicData);
  audio.pause();
  audio.src = musicData.previewUrl;
  audio.volume = 0;
  audio.load();

  audio.play().then(() => {
    setPlayingUI(true);
    // Smooth volume ramp from 0 → 0.9 over durationSec
    const steps = 20;
    const interval = (durationSec * 1000) / steps;
    const targetVol = 0.9;
    let step = 0;

    crossfadeTimer = setInterval(() => {
      step++;
      audio.volume = Math.min(targetVol, (step / steps) * targetVol);
      if (step >= steps) {
        clearInterval(crossfadeTimer);
        crossfadeTimer = null;
        audio.volume = targetVol;
      }
    }, interval);
  }).catch(() => {});
}

function playWithIntro(djMessage, musicData){
  if(!musicData || !musicData.previewUrl){
    addBubble('dj', djMessage);
    chatHistory.push({role:'assistant',content:djMessage});
    return;
  }
  // Show DJ message bubble
  addBubble('dj', djMessage);
  chatHistory.push({role:'assistant',content:djMessage});

  // First stop any music
  audio.pause();
  if (crossfadeTimer) { clearInterval(crossfadeTimer); crossfadeTimer = null; }

  // Speak the DJ message, then crossfade into music
  speakDJText(djMessage, () => {
    // TTS done → fade in music gradually
    npStatus.style.display = '';
    npStatus.textContent = '🎶 音乐渐入中…';
    fadeInMusic(musicData, 2.5);
    // Hide status after fade completes
    setTimeout(() => { npStatus.style.display = 'none'; }, 3000);
  });
}

// ── Bubbles ──
function addBubble(role,text){
  const d=document.createElement('div'); d.className='bubble bub-'+role; d.textContent=text;
  chatSection.appendChild(d);
  const scroll=document.getElementById('main-scroll');
  scroll.scrollTop=scroll.scrollHeight;
}
function addTyping(){
  const d=document.createElement('div');d.className='typing';d.id='typing';
  d.innerHTML='<span></span><span></span><span></span>';
  chatSection.appendChild(d);
  const scroll=document.getElementById('main-scroll');
  scroll.scrollTop=scroll.scrollHeight;
}
function rmTyping(){ const e=$('typing'); if(e)e.remove() }

// ── Audio events ──
audio.addEventListener('play',()=>setPlayingUI(true));
audio.addEventListener('pause',()=>{if(!audio.ended)setPlayingUI(false)});
audio.addEventListener('ended',()=>{
  setPlayingUI(false);
  progressFill.style.width='0%';timeNow.textContent='0:00';
  // Auto-play next song after a short delay
  setTimeout(()=>fetchNextAndPlay(),2000);
});
audio.addEventListener('timeupdate',()=>{if(audio.duration&&isFinite(audio.duration))updateProgress(audio.currentTime,audio.duration)});
audio.addEventListener('loadedmetadata',()=>updateProgress(0,audio.duration||0));
audio.addEventListener('error',()=>{setPlayingUI(false);progressFill.style.width='0%'});

$('btn-play').addEventListener('click',()=>{if(!audio.src)return;isPlaying?audio.pause():audio.play().catch(()=>{})});
$('btn-play-mini').addEventListener('click',()=>{if(!audio.src)return;isPlaying?audio.pause():audio.play().catch(()=>{})});
$('btn-next').addEventListener('click',()=>{stopTTS();audio.pause();audioNext.pause();audio.removeAttribute('src');audioNext.removeAttribute('src');setPlayingUI(false);progressFill.style.width='0%';fetchNextAndPlay()});
$('btn-prev').addEventListener('click',()=>{if(audio.src&&audio.duration){audio.currentTime=0;audio.play().catch(()=>{})}});

async function fetchNextAndPlay(){
  try{
    const r=await fetch(getApiUrl('/api/next-song'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({previousQuery:lastQuery||'',excludeTrackIds:playedIds.slice(-15)})});
    if(!r.ok)throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.music&&d.music.previewUrl) playMusicDirect(d.music);
  }catch(e){}
}

function updateTheme(){
  if(dark){ document.documentElement.classList.remove('light');document.documentElement.classList.add('dark');$('theme-ico').textContent='🌙' }
  else{ document.documentElement.classList.add('light');document.documentElement.classList.remove('dark');$('theme-ico').textContent='☀️' }
}
$('theme-btn').addEventListener('click',()=>{dark=!dark;updateTheme()});

// ── Send message ──
async function sendMsg(){
  if(busy)return; const t=userInput.value.trim(); if(!t)return;

  // Show setup modal if no server URL configured (APK mode)
  if (!API_BASE_URL && (location.protocol === 'file:' || location.hostname === '')) {
    showServerSetupModal();
    return;
  }

  busy=true; userInput.disabled=true; sendBtn.disabled=true; userInput.value=''; userInput.placeholder='…';
  addBubble('user',t); chatHistory.push({role:'user',content:t}); addTyping();

  // When user sends, stop any current TTS
  stopTTS();

  try{
    const r=await fetch(getApiUrl('/api/chat'),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:chatHistory})});
    if(!r.ok){ const e=await r.json().catch(()=>({})); throw new Error(e.error||e.details||'HTTP '+r.status) }
    const d=await r.json();
    const msg=d.message||'📡 信号波动…';
    rmTyping();
    if(d.searchQuery) lastQuery=d.searchQuery;
    if(d.music&&d.music.previewUrl){
      playWithIntro(msg, d.music);
    }else{
      addBubble('dj',msg); chatHistory.push({role:'assistant',content:msg});
      // Speak non-music responses too
      speakDJText(msg);
    }
  }catch(e){ rmTyping(); addBubble('dj','📡 信号波动，请稍后再试…'); chatHistory.pop(); progressFill.style.width='0%' }
  finally{ busy=false; userInput.disabled=false; sendBtn.disabled=false; userInput.placeholder='说心情，或点歌…'; userInput.focus() }
}

userInput.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();sendMsg()}});
sendBtn.addEventListener('click',sendMsg);

addBubble('dj','嗨，深夜未眠的朋友。我是 Near，你的专属电台 DJ 🎙 告诉我你的心情，或者直接点一首歌吧。');
chatHistory.push({role:'assistant',content:'嗨，深夜未眠的朋友。我是 Near，你的专属电台 DJ 🎙 告诉我你的心情，或者直接点一首歌吧。'});
updateTheme(); stopWave(); npWave.style.opacity='0.2';
// Show speaker button
setTimeout(()=>{ btnSpeaker.style.opacity='1'; btnSpeaker.textContent=ttsEnabled?'🔊':'🔇'; userInput.focus() },500);

// PWA service worker
if('serviceWorker' in navigator){ navigator.serviceWorker.register('/sw.js').catch(()=>{}) }
})();
